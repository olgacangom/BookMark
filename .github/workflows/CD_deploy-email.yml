name: 🚀 CD - Deploy & Notify

on:
  workflow_run:
    workflows: ["🐳 CD - Push to Docker Hub"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          # Aquí pondrías el webhook de tu servicio de hosting
          curl -f "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Send Success Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚀 BookMark: ¡Despliegue Exitoso!"
          to: olgacantalejog@gmail.com
          html_body: |
            <div style="border-left: 10px solid #28a745; padding: 20px; background-color: #f8f9fa;">
              <h2 style="color: #28a745;">✅ PRODUCCIÓN ACTUALIZADA</h2>
              <p>La nueva versión de <strong>BookMark</strong> ya está online.</p>
              <p>Imagen Docker generada y desplegada correctamente.</p>
            </div>