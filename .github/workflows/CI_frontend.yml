name: Frontend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ develop ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd frontend
          rm -f package-lock.json
          npm install
          npm install @rolldown/binding-linux-x64-gnu lightningcss-linux-x64-gnu

      - name: Run Test Coverage
        run: |
          cd frontend
          # Usamos --passWithNoTests por si acaso para evitar bloqueos
          npm run test:coverage -- --passWithNoTests

      - name: Run Lint
        run: cd frontend && npm run lint

      - name: Build Application
        run: cd frontend && npm run build